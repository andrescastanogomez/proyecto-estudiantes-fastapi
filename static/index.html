<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes - OTP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center p-4">

    <!-- CONTENEDOR PRINCIPAL DE LOGIN -->
    <div id="login-container" class="bg-[#1e293b] p-8 rounded-2xl shadow-2xl w-full max-auto max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Bienvenido</h1>
            <p class="text-slate-400">Ingresa a tu panel administrativo</p>
        </div>

        <!-- Paso 1: Email -->
        <div id="step-email" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Correo Electrónico</label>
                <input type="email" id="email" placeholder="nombre@correo.com" 
                    class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all">
            </div>
            <button onclick="enviarCorreo()" id="btn-envio"
                class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-lg transition-colors">
                Solicitar OTP
            </button>
        </div>

        <!-- Paso 2: OTP -->
        <div id="step-otp" class="hidden space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Código de Verificación</label>
                <input type="text" id="otp" placeholder="000000" maxlength="6"
                    class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-4 py-3 text-center text-2xl tracking-widest focus:outline-none focus:ring-2 focus:ring-teal-500">
            </div>
            <button onclick="verificarCodigo()" 
                class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-lg transition-colors">
                Verificar e Ingresar
            </button>
        </div>

        <div id="mensaje" class="mt-4 text-center text-sm"></div>
    </div>

    <!-- SECCIÓN DEL CRUD (OCULTA INICIALMENTE) -->
    <div id="step-crud" class="hidden w-full max-w-5xl animate-fade-in">
        <div class="bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
            
            <!-- Encabezado -->
            <div class="p-8 border-b border-slate-700 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-white">Gestión de Estudiantes</h2>
                    <p class="text-slate-400 text-sm">Panel administrativo</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 px-5 py-2.5 rounded-lg font-semibold transition-all">
                        Cerrar Sesión
                    </button>
                    <button onclick="abrirModalNuevo()" class="bg-teal-600 hover:bg-teal-500 px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 transition-all shadow-lg shadow-teal-900/20">
                        <i class="fas fa-plus"></i> NUEVO ESTUDIANTE
                    </button>
                </div>
            </div>

            <!-- Tabla -->
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50 text-teal-400 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="px-8 py-4 font-semibold">Nombre</th>
                            <th class="px-8 py-4 font-semibold">Apellido</th>
                            <th class="px-8 py-4 font-semibold">Carrera</th>
                            <th class="px-8 py-4 font-semibold text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-estudiantes" class="divide-y divide-slate-700">
                        <!-- Los datos se cargan desde JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL PARA CREAR / EDITAR -->
    <div id="modal-estudiante" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-[#1e293b] w-full max-w-md rounded-2xl border border-slate-700 shadow-2xl transform transition-all">
            <div class="p-6 border-b border-slate-700">
                <h3 id="modal-title" class="text-xl font-bold text-white">Nuevo Estudiante</h3>
            </div>
            
            <form id="form-estudiante" class="p-6 space-y-4" onsubmit="event.preventDefault(); guardarEstudiante();">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 uppercase font-bold mb-1">Nombre</label>
                        <input type="text" id="form-nombre" required class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 uppercase font-bold mb-1">Apellido</label>
                        <input type="text" id="form-apellido" required class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 uppercase font-bold mb-1">Carrera</label>
                    <input type="text" id="form-carrera" required class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 uppercase font-bold mb-1">Email del Estudiante</label>
                    <input type="email" id="form-email" required class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none">
                </div>

                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="cerrarModal()" class="px-4 py-2 text-slate-400 hover:text-white transition-colors">Cancelar</button>
                    <button type="submit" class="bg-teal-600 hover:bg-teal-500 px-6 py-2 rounded-lg font-bold text-white shadow-lg transition-all">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
