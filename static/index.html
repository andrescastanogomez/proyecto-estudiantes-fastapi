<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes - OTP System</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/styles.css">
</head>

<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div id="login-container"
        class="fade-in card-hover bg-[#1e293b] p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Bienvenido</h1>
            <p class="text-slate-400">Ingresa a tu panel administrativo</p>
        </div>

        <div id="step-email" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Correo Electrónico</label>
                <input type="email" id="email" placeholder="nombre@correo.com"
                    class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all">
            </div>

            <button onclick="enviarCorreo()" id="btn-envio"
                class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg">
                Solicitar OTP
            </button>
        </div>

        <div id="step-otp" class="hidden space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Código de Verificación</label>
                <input type="text" id="otp" placeholder="000000" maxlength="6"
                    class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-4 py-3 text-center text-2xl tracking-widest focus:outline-none focus:ring-2 focus:ring-teal-500">
            </div>

            <button onclick="verificarCodigo()"
                class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-lg transition-all">
                Verificar e Ingresar
            </button>
        </div>

        <div id="mensaje" class="mt-4 text-center text-sm"></div>
    </div>

    <div id="step-crud" class="hidden w-full max-w-5xl fade-in">

        <div class="card-hover bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">

            <div class="p-8 border-b border-slate-700 flex flex-col lg:flex-row lg:items-center justify-between gap-6">
                <div>
                    <h2 class="text-2xl font-bold text-white">Gestión de Estudiantes</h2>
                    <p class="text-slate-400 text-sm">Panel administrativo</p>
                </div>

                <div class="flex flex-wrap items-center gap-4">
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <i class="fas fa-search text-slate-500"></i>
                        </span>
                        <input type="text" id="buscador" onkeyup="filtrarTabla()" placeholder="Buscar estudiante..."
                            class="bg-[#0f172a] border border-slate-600 rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all w-64">
                    </div>

                    <button onclick="abrirModal()"
                        class="bg-teal-600 hover:bg-teal-500 px-5 py-2 rounded-lg font-bold flex items-center gap-2 transition-all shadow-lg text-white text-sm">
                        <i class="fas fa-plus"></i> NUEVO ESTUDIANTE
                    </button>

                    <button onclick="cerrarSesion()"
                        class="bg-slate-700 hover:bg-slate-600 px-5 py-2 rounded-lg font-semibold transition-all text-sm">
                        Cerrar Sesión
                    </button>
                </div>
            </div>

            <div class="px-8 py-4 bg-slate-800/30 border-b border-slate-700 flex items-center gap-4">
                <div class="bg-teal-500/10 p-3 rounded-lg">
                    <i class="fas fa-users text-teal-400 text-xl"></i>
                </div>
                <div>
                    <p class="text-slate-400 text-xs uppercase tracking-widest font-semibold">Total Registrados</p>
                    <p id="total-registrados" class="text-2xl font-bold text-white leading-none">0</p>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50 text-teal-400 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="px-8 py-4">Nombre</th>
                            <th class="px-8 py-4">Apellido</th>
                            <th class="px-8 py-4">Carrera</th>
                            <th class="px-8 py-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-estudiantes" class="divide-y divide-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-estudiante"
        class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">

        <div class="fade-in bg-[#1e293b] w-full max-w-md rounded-2xl border border-slate-700 shadow-2xl">
            <div class="p-6 border-b border-slate-700">
                <h3 id="modal-titulo" class="text-xl font-bold text-white">Nuevo Estudiante</h3>
            </div>

            <form class="p-6 space-y-4" onsubmit="event.preventDefault(); guardarEstudiante();">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="form-nombre" placeholder="Nombre" required
                        class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none text-white">

                    <input type="text" id="form-apellido" placeholder="Apellido" required
                        class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none text-white">
                </div>

                <input type="text" id="form-carrera" placeholder="Carrera" required
                    class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none text-white">

                <input type="email" id="form-email" placeholder="Email" required
                    class="w-full bg-[#0f172a] border border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none text-white">

                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="cerrarModal()"
                        class="px-4 py-2 text-slate-400 hover:text-white transition-colors">
                        Cancelar
                    </button>

                    <button type="submit"
                        class="bg-teal-600 hover:bg-teal-500 px-6 py-2 rounded-lg font-bold text-white shadow-lg transition-all">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/script.js"></script>

</body>
</html>
